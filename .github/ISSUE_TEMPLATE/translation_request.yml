name: Translation request
description: 提交还没汉化或翻译不自然的界面文案
title: "[Translation]: "
labels: ["translation"]
body:
  - type: input
    id: cursor-version
    attributes:
      label: Cursor 版本
      placeholder: "例如：3.6.31"
    validations:
      required: true
  - type: textarea
    id: original-text
    attributes:
      label: 原始英文
      description: 请填写界面上看到的英文。
    validations:
      required: true
  - type: textarea
    id: suggested-translation
    attributes:
      label: 建议中文
      description: 如果你有建议翻译，请写在这里。
  - type: textarea
    id: location
    attributes:
      label: 出现位置
      placeholder: "例如：设置页 > Plugins > Marketplace 左侧分类"
    validations:
      required: true
  - type: textarea
    id: screenshot
    attributes:
      label: 截图
      description: 请尽量裁掉账号、邮箱、历史对话标题和私有仓库路径。
